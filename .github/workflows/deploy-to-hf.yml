name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Hugging Face Hub
        run: pip install --upgrade huggingface-hub

      - name: Push to Hugging Face Space (safe)
        uses: huggingfacehub/actions-push-to-hub@v0.1.0
        with:
          repo_id: notebooklm-group2/NotebookLM-Clone
          repo_type: space
          path: .
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
